[pytest]
# Default per-test timeout. Individual tests can override via the
# ``@pytest.mark.timeout(N)`` decorator or the ``--timeout=N`` CLI flag.
timeout = 60

# ``thread`` instead of pytest-timeout's default ``signal`` mode.
#
# Why: MatterVis's async render worker (``crystal_viewer.app.render_worker``)
# runs ``build_figure`` on a background thread. When that thread
# wedges inside a C extension (numpy linalg, plotly's Mesh3d JSON
# encoder, or MolCrysKit's polyhedron-face merger), the ``signal``
# mode's SIGALRM only interrupts the *main* thread -- it cannot kill
# the worker, so pytest hangs even after pytest-timeout fires until
# the outer ``timeout`` shell wrapper kicks in (typically 240 s).
#
# ``thread`` mode launches a watchdog thread that, on timeout,
# inspects every live thread's frame and dumps a traceback before
# calling ``os._exit`` -- so the entire process dies. The downside
# is slightly noisier output on a real timeout (a stack dump per
# live thread), but that's a feature, not a bug, when the test is
# diagnosing a hang.
#
# Trade-off accepted: the historical ``signal`` mode let
# ``except`` clauses inside the test catch the ``Failed`` exception
# and continue; ``thread`` mode bypasses ``except`` entirely
# (process dies). MatterVis tests don't catch ``Failed``, so this
# difference is invisible.
timeout_method = thread

# Ignore the legacy matplotlib pipeline (``crystal_viewer/legacy``)
# during test discovery; it is intentionally vendored, not a
# first-class API surface, and its modules don't follow the
# ``test_*.py`` convention pytest looks for anyway.
norecursedirs = crystal_viewer/legacy
